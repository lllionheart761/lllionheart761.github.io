<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Databasestore - خدمات منزلية موثوقة</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0c0f16;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #fff;
        }

        /* حاوية الموقع الرئيسية مع الإطار الذهبي */
        .site-container {
            max-width: 400px;
            width: 90%;
            border: 8px solid;
            border-image: linear-gradient(to bottom right, #a1703e, #d4a76c 50%, #a1703e) 1;
            background-color: #121822;
            padding: 20px;
            border-radius: 15px; /* تم تدوير الحواف للإطار بناءً على الصورة */
            overflow: hidden;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            box-sizing: border-box;
        }

        .content-area {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        .site-title {
            font-size: 30px;
            font-weight: bold;
            margin-top: 20px;
            margin-bottom: 15px;
            color: #ffffff;
        }

        .service-list {
            list-style-type: none;
            padding: 0;
            margin-bottom: 25px;
        }

        .service-list li {
            font-size: 16px;
            color: #58b76e; /* اللون الأخضر للخدمات */
            margin-bottom: 5px;
        }

        /* فاصل رفيع تحت الخدمات */
        .service-list:after {
            content: '';
            display: block;
            width: 150px;
            height: 1px;
            background-color: rgba(255,255,255,0.1);
            margin: 15px auto 0;
        }

        .button-group {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        /* تنسيق الأزرار الأساسي */
        .action-button {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            padding: 15px 0;
            border-radius: 8px;
            text-decoration: none;
            color: #fff;
            font-weight: bold;
            font-size: 18px;
            transition: opacity 0.3s ease, transform 0.2s ease;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
            border: none;
            cursor: pointer;
        }

        .action-button:hover {
            opacity: 0.9;
            transform: translateY(-2px);
        }

        .action-button i {
            margin-left: 10px; /* المسافة بين الأيقونة والنص */
            font-size: 22px;
        }

        /* ألوان الأزرار المخصصة */
        .btn-call {
            background-color: #3b82f6; /* أزرق فاتح */
        }

        .btn-whatsapp {
            background-color: #22c55e; /* أخضر */
        }

        .btn-work {
            background-color: #3b82f6; /* نفس أزرق الاتصال */
        }

        .btn-yelp {
            background-color: #ef4444; /* أحمر */
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        /* تنسيق خاص لأيقونة Yelp والنجوم */
        .btn-yelp .yelp-icon {
            color: #fff;
            font-size: 24px;
            margin-right: 5px;
        }

        .btn-yelp .yelp-stars {
            color: #fbbf24; /* لون النجوم الذهبي */
            font-size: 14px;
            margin-right: 5px;
        }
    </style>
</head>
<body>
    <div class="site-container">
        <div class="content-area">
            <h1 class="site-title">Databasestore</h1>
            
            <ul class="service-list">
                <li>Professional TV Mounting</li>
                <li>Expert Furniture Assembly</li>
                <li>Fast & Clean Work</li>
                <li>Trusted Service</li>
            </ul>

            <div class="button-group">
                <a href="tel:+123456789" class="action-button btn-call">
                    <i class="fas fa-phone"></i>
                    Call Me
                </a>
                
                <a href="https://wa.me/123456789" class="action-button btn-whatsapp">
                    <i class="fab fa-whatsapp"></i>
                    WhatsApp
                </a>
                
                <a href="#work" class="action-button btn-work">
                    <i class="fas fa-images"></i>
                    View My Work
                </a>
                
                <a href="#yelp" class="action-button btn-yelp">
                    <i class="fab fa-yelp yelp-icon"></i>
                    <span class="yelp-stars">
                        <i class="fas fa-star"></i>
                        <i class="fas fa-star"></i>
                        <i class="fas fa-star"></i>
                        <i class="fas fa-star"></i>
                        <i class="fas fa-star-half-alt"></i>
                    </span>
                    Check My Yelp Reviews
                </a>
            </div>
        </div>
    </div>
</body>
</html>
