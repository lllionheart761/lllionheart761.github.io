<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Database Store</title>

<style>
body {
  font-family: Arial, sans-serif;
  margin: 0;
  background: #0f172a;
  color: white;
  text-align: center;
}

/* FRAME */
.frame {
  margin: 20px;
  padding: 20px;
  border-radius: 20px;
  border: 4px solid #8b5a2b;
  box-shadow: 
    0 0 20px rgba(0,0,0,0.6),
    inset 0 0 15px rgba(0,0,0,0.5);
  background: linear-gradient(145deg, #1e293b, #0f172a);
}

/* CONTAINER */
.container {
  padding: 40px 20px;
}

/* TITLE */
h1 {
  font-size: 40px;
  margin-bottom: 20px;
}

/* SLIDER */
.slider {
  height: 60px;
  overflow: hidden;
  color: #22c55e;
  font-weight: bold;
  font-size: 20px;
  margin-bottom: 20px;
}

.slider p {
  animation: slide 10s infinite;
  margin: 0;
}

@keyframes slide {
  0% {margin-top: 0;}
  25% {margin-top: -60px;}
  50% {margin-top: -120px;}
  75% {margin-top: -180px;}
  100% {margin-top: 0;}
}

/* TEXT */
p {
  font-size: 18px;
  color: #cbd5f5;
}

/* BUTTON */
.btn {
  display: block;
  margin: 15px auto;
  padding: 15px;
  width: 250px;
  border-radius: 8px;
  text-decoration: none;
  font-size: 18px;
  color: white;
  background: #2563eb;
  transition: 0.3s;
}

.btn:hover {
  background: #22c55e;
  transform: scale(1.05);
}
</style>

</head>

<body>

<div class="frame">
<div class="container">

<h1>Databasestore</h1>

<!-- SLIDER (صار واضح ومكانه صح) -->
<div class="slider">
  <p>Professional TV Mounting</p>
  <p>Expert Furniture Assembly</p>
  <p>Fast & Clean Work</p>
  <p>Trusted Service</p>
</div>

<p>TV Mounting • Furniture Assembly • General Mounting • Home Services</p>

</div>
</div>

</body>
</html>
