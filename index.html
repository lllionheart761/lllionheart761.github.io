<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Databasestore</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#0f172a;
  color:white;
  text-align:center;
}

/* الصور الجانبية */
.side {
  position: fixed;
  top:0;
  width:80px;
  height:100%;
  overflow:hidden;
  z-index:0;
}

.left { left:0; }
.right { right:0; }

.side img {
  width:100%;
  margin:10px 0;
  border-radius:10px;
  animation: scroll 20s linear infinite;
}

@keyframes scroll {
  0% { transform: translateY(0); }
  100% { transform: translateY(-100%); }
}

/* المحتوى */
.container {
  position:relative;
  z-index:2;
  padding:60px 20px;
  max-width:600px;
  margin:auto;
}

h1 {
  font-size:40px;
  margin-bottom:10px;
}

/* السلايدر */
.slider {
  height:30px;
  overflow:hidden;
  color:#22c55e;
  font-weight:bold;
  margin-bottom:10px;
}

.slider p {
  margin:0;
  animation: slide 10s infinite;
}

@keyframes slide {
  0% {margin-top:0;}
  25% {margin-top:-30px;}
  50% {margin-top:-60px;}
  75% {margin-top:-90px;}
  100% {margin-top:0;}
}

p {
  color:#cbd5f5;
}

/* الأزرار */
.btn {
  display:block;
  margin:15px auto;
  padding:15px;
  width:250px;
  border-radius:10px;
  text-decoration:none;
  font-size:18px;
  color:white;
}

.call { background:#2563eb; }
.whatsapp { background:#22c55e; }
.work { background:#2563eb; }
.yelp { background:#dc2626; }

.btn:hover {
  opacity:0.8;
}

/* موبايل */
@media(max-width:768px){
  .side {
    display:none;
  }
}
</style>

</head>

<body>

<!-- صور اليسار -->
<div class="side left">
  <img src="images/tv1.jpg">
  <img src="images/furniture1.jpg">
  <img src="images/tools1.jpg">
</div>

<!-- صور اليمين -->
<div class="side right">
  <img src="images/tv2.jpg">
  <img src="images/furniture2.jpg">
  <img src="images/tools2.jpg">
</div>

<div class="container">

<h1>Databasestore</h1>

<div class="slider">
  <p>Professional TV Mounting</p>
  <p>Expert Furniture Assembly</p>
  <p>Fast & Clean Work</p>
  <p>Trusted Service</p>
</div>

<p>TV Mounting • Furniture Assembly • General Mounting • Home Services</p>

<a class="btn yelp" href="https://biz.yelp.com/biz_info/FEl_QlZjSqA6QgZeCGW0xA">⭐ Check My Yelp Reviews</a>

</div>

</body>
</html>
